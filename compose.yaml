services:
  db:
    image: postgres:17
    container_name: funandchecks-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Собственный почтовый сервер (send-only). Письма с подтверждением/сбросом
  # пароля уходят через него — без внешних сервисов и лимитов.
  mail:
    image: boky/postfix:latest
    container_name: funandchecks-mail
    restart: always
    environment:
      # Домен, от чьего имени разрешена отправка (должен совпадать с Smtp__FromEmail).
      ALLOWED_SENDER_DOMAINS: ${MAIL_DOMAIN}
      HOSTNAME: mail.${MAIL_DOMAIN}
      # Автогенерация DKIM-ключа (публичную часть нужно добавить в DNS — см. DEPLOY.md).
      DKIM_AUTOGENERATE: "1"
    volumes:
      - maildkim:/etc/opendkim/keys
    expose:
      - "587"

  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - funandchecks-api

  funandchecks-api:
    container_name: funandchecks-api
    image: funandchecks-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    user: root
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_started
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:${API_INTERNAL_PORT}
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      # Почта: отправляем через контейнер mail по внутренней сети (без TLS/авторизации).
      - Smtp__Host=mail
      - Smtp__Port=587
      - Smtp__UseStartTls=false
      - Smtp__FromEmail=noreply@${MAIL_DOMAIN}
      - Smtp__FromName=FunAndChecks
      # Каталог бэкапов внутри контейнера (смонтирован на том backups).
      - Backup__Directory=/app/backups
      # Разрешённые источники для CORS в проде (через запятую отображаются как массив).
      - Cors__AllowedOrigins__0=https://${APP_DOMAIN}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${API_INTERNAL_PORT}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "${API_INTERNAL_PORT}"
    volumes:
      - dataprotection-keys:/home/app/.aspnet/DataProtection-Keys
      # Секреты приложения (как минимум InitialAdmins). Создаётся из secrets.template.json.
      - ./secrets.json:/app/secrets.json:ro
      # Том для дампов БД (ручка POST /api/admin/backup).
      - backups:/app/backups


volumes:
  pgdata:
  dataprotection-keys:
  caddy_data:
  caddy_config:
  maildkim:
  backups:
